name: Configure GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  configure-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Configure GitHub Pages source
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            try {
              const response = await github.rest.repos.createPagesSite({
                owner,
                repo,
                source: {
                  branch: 'main',
                  path: '/',
                },
              });
              console.log(`Pages created: ${response.data.html_url}`);
            } catch (error) {
              console.error(error);
              throw error;
            }
