name: Configure GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  configure-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Configure GitHub Pages source
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            await github.request('PUT /repos/{owner}/{repo}/pages', {
              owner,
              repo,
              source: {
                branch: 'main',
                path: '/',
              },
            });
            const page = await github.request('GET /repos/{owner}/{repo}/pages', {
              owner,
              repo,
            });
            core.info(`Pages configured: ${page.data.html_url}`);
