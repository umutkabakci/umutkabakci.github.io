name: Configure GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  configure-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Configure GitHub Pages source
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            try {
              await github.rest.repos.getPages({ owner, repo });
              const response = await github.rest.repos.updatePagesSite({
                owner,
                repo,
                source: {
                  branch: 'gh-pages',
                  path: '/',
                },
              });
              console.log(`Pages updated to gh-pages: ${response.data.html_url}`);
            } catch (error) {
              if (error.status === 404) {
                const response = await github.rest.repos.createPagesSite({
                  owner,
                  repo,
                  source: {
                    branch: 'gh-pages',
                    path: '/',
                  },
                });
                console.log(`Pages created: ${response.data.html_url}`);
              } else {
                console.error(error);
                throw error;
              }
            }
